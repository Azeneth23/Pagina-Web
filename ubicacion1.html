<!DOCTYPE html>
<!-- Documento HTML5 -->

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ubicación Alterna</title>

    <!-- Conexión al CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <h1 class="titulo">Ubicación en el Mapa</h1>

    <!-- Caja informativa -->
    <div class="caja">

        <p>Este mapa muestra mi ubicación real usando coordenadas geográficas.</p>

        <!-- NUEVAS coordenadas -->
        <p>Latitud: 20.10108</p>
        <p>Longitud: -98.768992</p>

    </div>

    <!-- Mapa -->
    <div class="mapa">

        <!-- iframe actualizado -->
        <iframe 
            src="https://www.google.com/maps?q=20.10108,-98.768992&output=embed">
        </iframe>

    </div>

</body>
</html>
