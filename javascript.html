<!DOCTYPE html> 
<html lang="es"> 

<head> 
    <!-- Configuración de caracteres para soportar acentos -->
    <meta charset="UTF-8"> 
    
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Ejemplo JavaScript</title> 
</head> 

<body> 

    <!-- Encabezado principal que se muestra en la página -->
    <h1>¡Hola, JavaScript!</h1> 

    <!-- 
        Botón que ejecuta una función de JavaScript al hacer clic.
        onclick="saludar()" llama a la función llamada saludar()
    -->
    <button onclick="saludar()">Haz clic aquí</button> 

    <script> 
        /*
            Función: saludar()
            Descripción:
            Esta función se ejecuta cuando el usuario hace clic en el botón.
            Muestra un mensaje emergente (alerta) en la pantalla.
        */
        function saludar() { 
            // Muestra una ventana emergente con un mensaje
            alert("¡Bienvenida/o al mundo de JavaScript!"); 
        } 
    </script> 

</body> 
</html>
